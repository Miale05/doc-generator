name: Generar Actas

on:
  workflow_dispatch:
    inputs:
      fila_inicio:
        description: "Fila de Inicio (ej: 2)"
        required: true
        default: "2"
      fila_fin:
        description: "Fila de Fin (ej: 4), si no se coloca se procesaran todas las filas hasta la última"
        required: false
        default: "2"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run actas generator
        run: python main.py --fila-inicio "${{ github.event.inputs.fila_inicio }}" --fila-fin "${{ github.event.inputs.fila_fin }}"

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: actas-generadas
          path: resultados/
          retention-days: 7
